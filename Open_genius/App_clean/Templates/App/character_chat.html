{% extends "App/base.html" %}

{% block content %}
<div class="container">
    <h2>Chat with {{ profile.get_character_type_display }}</h2>
    <div class="chat-container">
        <div id="chat-history" class="mb-3">
            <!-- Chat messages will appear here -->
        </div>
        <form id="chat-form" method="post">
            {% csrf_token %}
            <div class="form-group">
                <textarea name="text_input" class="form-control" rows="3" placeholder="Type your message..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
        <audio id="response-audio" controls class="mt-3" style="display:none;"></audio>
    </div>
</div>

<script>
document.getElementById('chat-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    
    fetch(window.location.pathname, {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': formData.get('csrfmiddlewaretoken')
        }
    })
    .then(response => response.json())
    .then(data => {
        // Display response
        const chatHistory = document.getElementById('chat-history');
        chatHistory.innerHTML += `<div class="user-message">You: ${formData.get('text_input')}</div>`;
        chatHistory.innerHTML += `<div class="ai-message">${profile.get_character_type_display}: ${data.response}</div>`;
        
        // Play audio response
        const audioPlayer = document.getElementById('response-audio');
        audioPlayer.src = data.audio_url;
        audioPlayer.style.display = 'block';
        audioPlayer.play();
        
        // Clear input
        this.reset();
    });
});
</script>
{% endblock %}
